<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Page introuvable — Hôtel Résidence Majesté</title>
  <link rel="icon" type="image/png" href="images/logo.jpg"/>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/loader.css"/>
  <style>
    body { background:var(--cream); }
    .not-found {
      min-height:100vh; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      text-align:center; padding:40px 24px;
    }
    .not-found-number {
      font-family:var(--font-display); font-size:clamp(6rem,20vw,12rem);
      font-weight:900; line-height:1;
      background:linear-gradient(135deg,var(--blue),var(--yellow),var(--red));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text; margin-bottom:8px;
    }
    .not-found img { height:64px; margin-bottom:20px; }
    .not-found h2 { font-family:var(--font-display); font-size:clamp(1.4rem,4vw,2rem); font-weight:700; color:var(--dark); margin-bottom:12px; }
    .not-found p  { color:var(--gray); max-width:440px; line-height:1.7; margin-bottom:32px; font-size:0.95rem; }
    .not-found-btns { display:flex; gap:14px; flex-wrap:wrap; justify-content:center; }
  </style>
</head>
<body>
<div class="not-found">
  <img src="images/logo.jpg" alt="Majesté"/>
  <div class="not-found-number">404</div>
  <h2>Page introuvable</h2>
  <p>La page que vous cherchez n'existe pas ou a été déplacée. Retournez à l'accueil pour continuer votre visite de l'Hôtel Résidence Majesté.</p>
  <div class="not-found-btns">
    <a href="index.html" class="btn btn-primary btn-lg">← Retour à l'accueil</a>
    <a href="reservation.html" class="btn btn-yellow btn-lg">Réserver une chambre</a>
  </div>
</div>
<script src="js/main.js"></script>
</body>
</html>
